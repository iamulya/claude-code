# ── Token budget config ───────────────────────────────────────────────────────

budget:
  text_document_tokens: 6000
  image_tokens: 1200
  max_images_per_fetch: 3

# ── Compiler model config ─────────────────────────────────────────────────────

compiler:
  extraction_model: gemini-3-flash-preview
  synthesis_model: gemini-3-flash-preview
